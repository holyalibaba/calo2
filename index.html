function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function toDateKey(ts) { const d=new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function formatDate(k) {
  const [y,m,d]=k.split("-").map(Number), date=new Date(y,m-1,d), today=new Date(); today.setHours(0,0,0,0);
  const yest=new Date(today); yest.setDate(today.getDate()-1);
  if(date.getTime()===today.getTime()) return "Hôm nay";
  if(date.getTime()===yest.getTime())  return "Hôm qua";
  return date.toLocaleDateString("vi-VN",{weekday:"long",day:"numeric",month:"numeric"});
}
function sumList(list) { return list.reduce((a,e)=>({cal:a.cal+(e.cal||0),pro:a.pro+(e.pro||0),fat:a.fat+(e.fat||0),carb:a.carb+(e.carb||0),fib:a.fib+(e.fib||0),sod:a.sod+(e.sod||0)}),{cal:0,pro:0,fat:0,carb:0,fib:0,sod:0}); }
function pct(v,g)    { return Math.min(100, Math.round(v/g*100)); }
function barColor(p) { return p>=100?"#ef4444":p>=80?"#f97316":"#22c55e"; }

function getMult(food, unit) {
  if (food.per === 1) {
    const n = parseFloat(unit) || 1;
    return n;
  }
  // per===100 → parse grams/ml from unit label
  const g  = unit.match(/\(?([\d.]+)\s*g\)?/);
  const ml = unit.match(/\(?([\d.]+)\s*ml\)?/);
  if (g)  return parseFloat(g[1])  / 100;
  if (ml) return parseFloat(ml[1]) / 100;
  const n = parseFloat(unit);
  if (!isNaN(n)) return n / 100;
  return 1;
}

  "gà":"chicken","bò":"beef","heo":"pork","lợn":"pork","cá":"fish","tôm":"shrimp",
  "trứng":"egg","cơm":"rice","bún":"rice noodle","mì":"noodle","rau":"vegetable",

  "dưa hấu":"watermelon","ổi":"guava","thanh long":"dragon fruit","bưởi":"grapefruit",
  "đậu phụ":"tofu","đậu nành":"soybean","đậu xanh":"mung bean","lạc":"peanut",
  "thịt":"meat","ức gà":"chicken breast","đùi gà":"chicken thigh",
  "yến mạch":"oatmeal","whey":"whey protein",
};
function translateToEN(vn) {
  let r = vn.toLowerCase();
  Object.entries(VN_TO_EN).sort((a,b)=>b[0].length-a[0].length).forEach(([v,e])=>{ r=r.replace(v,e); });
  return r;
}
async function searchUSDA(query) {
  const queries = [...new Set([query, translateToEN(query)])];
  for (const q of queries) {
    try {
      const res  = await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(q)}&pageSize=3&dataType=SR%20Legacy,Foundation&api_key=${USDA_KEY}`);
      const data = await res.json();
      if (!data.foods?.length) continue;
      const food = data.foods[0];
      const get  = (...kws) => { for(const kw of kws){ const n=food.foodNutrients?.find(x=>x.nutrientName?.toLowerCase().includes(kw)); if(n&&n.value!=null) return +n.value.toFixed(1); } return 0; };
      return { cal:get("energy","calories"), pro:get("protein"), fat:get("total lipid","fat"), carb:get("carbohydrate"), fib:get("fiber"), sod:get("sodium") };
    } catch {}
  }
  return null;
}

function pushEntry(name, amount, cal, pro, fat, carb, fib, sod) {
  entries.push({id:Date.now(), name:cap(name), amount, cal:+cal.toFixed(1), pro:+pro.toFixed(1), fat:+fat.toFixed(1), carb:+carb.toFixed(1), fib:+fib.toFixed(1), sod:+sod.toFixed(0)});
  save(); render();
}

function quickAdd(key, unit) {
  const food = DB[key], m = getMult(food, unit);
  pushEntry(key, unit, food.cal*m, food.pro*m, food.fat*m, food.carb*m, food.fib*m, food.sod*m);
  selectedFood = null; selectedUnit = null;
}

  if(found) {
    const food=DB[found], n=parseFloat(qtyRaw)||1, m=food.per===1?n:1;
    pushEntry(found, food.per===1?(n>1?n+"x "+food.amt:food.amt):(qtyRaw||"100")+"g", food.cal*m, food.pro*m, food.fat*m, food.carb*m, food.fib*m, food.sod*m);
    qtyEl.value=""; nameEl.value=""; return;
  }
  const btn=document.getElementById("addBtn"); btn.textContent="🔍 Đang tìm..."; btn.disabled=true;
  const result = await searchUSDA(name); btn.textContent="➕ Thêm món"; btn.disabled=false;
  if(!result){ alert("Không tìm thấy '"+name+"'.\nThử tên tiếng Anh (VD: salmon, oatmeal)"); return; }
  const grams=parseFloat(qtyRaw)||100, m=grams/100;
  pushEntry(name, grams+"g", result.cal*m, result.pro*m, result.fat*m, result.carb*m, result.fib*m, result.sod*m);
  qtyEl.value=""; nameEl.value="";
}

function addCustom() {
  const name = document.getElementById("customName").value.trim() || "Món khác";
  const cal  = parseFloat(document.getElementById("customCal").value)  || 0;
  if(!cal){ alert("Vui lòng nhập số calo!"); return; }
  const pro  = parseFloat(document.getElementById("customPro").value)  || 0;
  const fat  = parseFloat(document.getElementById("customFat").value)  || 0;
  const carb = parseFloat(document.getElementById("customCarb").value) || 0;
  pushEntry(name, "tuỳ chỉnh", cal, pro, fat, carb, 0, 0);
  ["customName","customCal","customPro","customFat","customCarb"].forEach(id=>{ document.getElementById(id).value=""; });
}

function removeEntry(id) { entries=entries.filter(e=>e.id!==id); save(); render(); }

// ── UI ACTIONS ─────────────────────────────────────────
function switchTab(tab, el) {
  currentTab=tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active")); el.classList.add("active");
  ["add","log","data"].forEach(t=>{ document.getElementById("tab-"+t).style.display=t===tab?"block":"none"; });
  render();
}
function selectFood(key) { selectedFood = (selectedFood===key)?null:key; selectedUnit = selectedFood ? DB[key].def : null; render(); }
function selectUnit(u)   { selectedUnit = u; render(); }

function handleChipClick(el) {
  const key = el.getAttribute("data-key");
  selectFood(key);
}
function handleUnitClick(el) {
  const u = el.getAttribute("data-unit");
  selectUnit(u);
}
function handleQuickAdd() {
  if(selectedFood && selectedUnit) quickAdd(selectedFood, selectedUnit);
}
function toggleGroup(label) { expandedGroups[label]=!expandedGroups[label]; render(); }
function toggleDay(key)     { expandedDays[key]=!(expandedDays[key]!==false); render(); }
function updateGoal(key, val) { GOALS[key]=+val; saveGoals(); render(); }

// ── RENDER ─────────────────────────────────────────────
function render() {
  document.getElementById("subtitle").textContent = "Mục tiêu: " + GOALS.calories.toLocaleString() + " kcal/ngày";
  if(currentTab==="add")  renderAdd();
  if(currentTab==="log")  renderLog();
  if(currentTab==="data") renderData();
}

function renderAdd() {
  const today=toDateKey(Date.now()), todayE=entries.filter(e=>toDateKey(e.id)===today), t=sumList(todayE);
  const calPct=pct(t.cal,GOALS.calories), rem=GOALS.calories-t.cal;

  // Preview for selected quick food
  let previewHTML = "";
  if(selectedFood && DB[selectedFood]) {
    const food=DB[selectedFood];
    previewHTML = `
    <div class="dark" style="margin-top:10px">
      <div style="font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:8px">${cap(selectedFood)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:${selectedUnit?10:0}px">
        ${food.units.map(u=>`<button class="unit-chip${selectedUnit===u?" active":""}" data-unit="${u}" onclick="handleUnitClick(this)">${u}</button>`).join("")}
      </div>
      ${selectedUnit ? `
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
        ${(()=>{ const m=getMult(food,selectedUnit); return `
          <span class="tag" style="background:#1e3a5f;color:#38bdf8"><b>${(food.cal*m).toFixed(0)}</b> kcal</span>
          <span class="tag" style="background:#1e1b4b;color:#818cf8">P: ${(food.pro*m).toFixed(1)}g</span>
          <span class="tag" style="background:#431407;color:#fb923c">F: ${(food.fat*m).toFixed(1)}g</span>
          <span class="tag" style="background:#422006;color:#facc15">C: ${(food.carb*m).toFixed(1)}g</span>
        `; })()}
      </div>
      <button class="btn" style="background:#16a34a;color:#fff" onclick="handleQuickAdd()">✅ Thêm vào nhật ký</button>
      ` : ""}
    </div>`;
  }

  document.getElementById("tab-add").innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:11px;color:#64748b;margin-bottom:4px">HÔM NAY</div>
    <div style="font-size:34px;font-weight:700;color:${calPct>=100?"#ef4444":"#38bdf8"}">${t.cal.toFixed(0)} <span style="font-size:15px;color:#94a3b8">/ ${GOALS.calories.toLocaleString()} kcal</span></div>
    <div class="bar-wrap"><div class="bar" style="width:${calPct}%;background:${barColor(calPct)}"></div></div>
    <div style="font-size:13px;color:${rem>=0?"#86efac":"#fca5a5"}">${rem>=0?`Còn lại: ${rem.toFixed(0)} kcal`:`Vượt quá: ${Math.abs(rem).toFixed(0)} kcal`}</div>
    <div class="grid3">
      ${[{l:"Protein",v:t.pro,g:GOALS.protein,u:"g",c:"#818cf8"},{l:"Chất béo",v:t.fat,g:GOALS.fat,u:"g",c:"#fb923c"},{l:"Carbs",v:t.carb,g:GOALS.carbs,u:"g",c:"#facc15"}].map(m=>`
      <div class="macro">
        <div style="font-size:11px;color:#94a3b8;margin-bottom:4px">${m.l}</div>
        <div style="font-size:15px;font-weight:700;color:${m.c}">${m.v.toFixed(1)}${m.u}</div>
        <div class="mini-bar"><div style="width:${pct(m.v,m.g)}%;height:100%;background:${m.c};border-radius:99px"></div></div>
        <div style="font-size:10px;color:#64748b;margin-top:2px">/ ${m.g}${m.u}</div>
      </div>`).join("")}
    </div>
    <div class="grid2">
      <div class="dark" style="display:flex;justify-content:space-between"><span style="font-size:12px;color:#94a3b8">Chất xơ</span><span style="font-size:13px;font-weight:700;color:#34d399">${t.fib.toFixed(1)} g</span></div>
      <div class="dark" style="display:flex;justify-content:space-between"><span style="font-size:12px;color:#94a3b8">Natri</span><span style="font-size:13px;font-weight:700;color:#f472b6">${t.sod.toFixed(0)} mg</span></div>
    </div>
  </div>

  <div class="card">
    <div style="font-size:12px;color:#94a3b8;font-weight:600;margin-bottom:10px">✏️ Nhập theo tên món</div>
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-end">
      <div><div class="label">① Số lượng / gram</div><input type="number" id="qty" placeholder="VD: 2" style="width:90px;border:2px solid #38bdf8"/></div>
      <div style="flex:1"><div class="label">② Tên món</div><input type="text" id="foodInput" placeholder="Tên món ăn..." onkeydown="if(event.key==='Enter')manualAdd()"/></div>
    </div>
    <button id="addBtn" class="btn" style="background:#3b82f6;color:#fff" onclick="manualAdd()">➕ Thêm món</button>
    <div style="font-size:11px;color:#475569">⚡ Có sẵn → tức thì &nbsp;|&nbsp; 🔍 Không có → tìm USDA (nhập gram)</div>
  </div>

  <div class="card">
    <div style="font-size:12px;color:#94a3b8;font-weight:600;margin-bottom:10px">✍️ Nhập calo thủ công</div>
    <div style="margin-bottom:8px"><div class="label">Tên món (tuỳ ý)</div><input type="text" id="customName" placeholder="VD: Bánh kem, Cơm văn phòng..."/></div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div style="flex:1"><div class="label">Calo (kcal) *</div><input type="number" id="customCal" placeholder="VD: 350"/></div>
      <div style="flex:1"><div class="label">Protein (g)</div><input type="number" id="customPro" placeholder="0"/></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div style="flex:1"><div class="label">Chất béo (g)</div><input type="number" id="customFat" placeholder="0"/></div>
      <div style="flex:1"><div class="label">Carbs (g)</div><input type="number" id="customCarb" placeholder="0"/></div>
    </div>
    <button class="btn" style="background:#7c3aed;color:#fff" onclick="addCustom()">➕ Thêm vào nhật ký</button>
  </div>

  <div class="card">
    <div style="font-size:12px;color:#94a3b8;font-weight:600;margin-bottom:10px">⚡ Chọn nhanh</div>
    ${GROUPS.map(g=>`
    <div style="margin-bottom:8px">
      <button class="group-btn" onclick="toggleGroup('${g.label}')">
        <span style="font-size:13px;color:#94a3b8;font-weight:600">${g.label}</span>
        <span style="color:#475569;font-size:11px">${expandedGroups[g.label]?"▲":"▼"}</span>
      </button>
      ${expandedGroups[g.label]?`<div style="display:flex;flex-wrap:wrap;gap:7px;padding:8px 4px 0">
        ${g.keys.map(k=>`<button class="chip${selectedFood===k?" active":""}" data-key="${k}" onclick="handleChipClick(this)">${cap(k)}</button>`).join("")}
      </div>`:""}
    </div>`).join("")}
    ${previewHTML}
  </div>`;
}

function renderLog() {
  const grouped={};
  entries.forEach(e=>{ const k=toDateKey(e.id); if(!grouped[k]) grouped[k]=[]; grouped[k].push(e); });
  const days=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  if(!days.length){ document.getElementById("tab-log").innerHTML=`<div style="text-align:center;color:#475569;padding:40px">Chưa có nhật ký nào 🍽️</div>`; return; }
  document.getElementById("tab-log").innerHTML = days.map(dk=>{
    const items=grouped[dk], s=sumList(items), exp=expandedDays[dk]!==false, cp=pct(s.cal,GOALS.calories);
    return `<div class="card" style="padding:0;overflow:hidden">
      <button class="day-header" onclick="toggleDay('${dk}')">
        <div><div style="font-size:14px;font-weight:700;color:#e2e8f0">${formatDate(dk)}</div><div style="font-size:11px;color:#64748b">${dk} · ${items.length} món</div></div>
        <div style="text-align:right">
          <div style="font-size:16px;font-weight:700;color:${cp>=100?"#ef4444":"#38bdf8"}">${s.cal.toFixed(0)} kcal</div>
          <div style="font-size:11px;color:${cp>=100?"#fca5a5":"#86efac"}">${cp>=100?`+${(s.cal-GOALS.calories).toFixed(0)}`:`${(GOALS.calories-s.cal).toFixed(0)} còn lại`}</div>
        </div>
      </button>
      <div style="height:4px;background:#0f172a;margin:0 14px"><div style="width:${cp}%;height:100%;background:${barColor(cp)};border-radius:99px"></div></div>
      ${exp?`<div style="padding:10px 14px 14px">
        <div class="dark">
          <div style="font-size:11px;color:#64748b;font-weight:600;margin-bottom:6px">TỔNG DINH DƯỠNG NGÀY</div>
          ${[["🔵 Calo",s.cal,"kcal","#38bdf8"],["🟣 Protein",s.pro,"g","#818cf8"],["🟠 Chất béo",s.fat,"g","#fb923c"],["🟡 Carbs",s.carb,"g","#facc15"],["🟢 Chất xơ",s.fib,"g","#34d399"],["🩷 Natri",s.sod,"mg","#f472b6"]].map(([l,v,u,c])=>`
          <div class="row"><span style="font-size:12px;color:#94a3b8">${l}</span><span style="font-size:12px;font-weight:700;color:${c}">${Number(v).toFixed(1)} ${u}</span></div>`).join("")}
        </div>
        ${items.map(e=>`
        <div class="food-entry">
          <div style="flex:1">
            <div style="font-weight:600;font-size:13px">${e.name}</div>
            <div style="font-size:10px;color:#64748b;margin-bottom:3px">${e.amount}</div>
            <div class="tags">
              <span class="tag" style="background:#1e3a5f;color:#38bdf8"><b>${e.cal}</b> kcal</span>
              <span class="tag" style="background:#1e1b4b;color:#818cf8">P:${e.pro}g</span>
              <span class="tag" style="background:#431407;color:#fb923c">F:${e.fat}g</span>
              <span class="tag" style="background:#422006;color:#facc15">C:${e.carb}g</span>
            </div>
          </div>
          <button onclick="removeEntry(${e.id})" style="background:none;border:none;color:#475569;font-size:18px;cursor:pointer;padding:0;align-self:center">×</button>
        </div>`).join("")}
      </div>`:""}
    </div>`;
  }).join("");
}

function renderData() {
  const grouped={};
  entries.forEach(e=>{ const k=toDateKey(e.id); if(!grouped[k]) grouped[k]=[]; grouped[k].push(e); });
  document.getElementById("tab-data").innerHTML=`
  <div class="card">
    <div style="font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:12px">🎯 Điều chỉnh mục tiêu/ngày</div>
    ${[{label:"🔵 Calo (kcal)",key:"calories",min:1000,max:5000,step:50},{label:"🟣 Protein (g)",key:"protein",min:30,max:300,step:5},{label:"🟠 Chất béo (g)",key:"fat",min:20,max:200,step:5},{label:"🟡 Carbs (g)",key:"carbs",min:50,max:600,step:10}].map(g=>`
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;color:#94a3b8">${g.label}</span>
        <span style="font-size:13px;font-weight:700;color:#e2e8f0" id="gv-${g.key}">${GOALS[g.key]}</span>
      </div>
      <input type="range" min="${g.min}" max="${g.max}" step="${g.step}" value="${GOALS[g.key]}"
        oninput="GOALS['${g.key}']=+this.value; document.getElementById('gv-${g.key}').textContent=this.value; saveGoals(); render();"/>
    </div>`).join("")}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:6px">☁️ Lưu tự động</div>
    <div style="font-size:13px;color:#94a3b8;margin-bottom:10px">Dữ liệu lưu vào localStorage của trình duyệt, không mất khi đóng app.</div>
    <div class="dark" style="display:flex;justify-content:space-between">
      <span style="font-size:13px;color:#94a3b8">Tổng bản ghi</span>
      <span style="font-size:15px;font-weight:700;color:#38bdf8">${entries.length} món · ${Object.keys(grouped).length} ngày</span>
    </div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:6px">📤 Sao lưu</div>
    <button class="btn" style="background:#0369a1;color:#fff" onclick="exportData()" ${!entries.length?"disabled":""}>📥 Tải file JSON (${entries.length} bản ghi)</button>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:6px">📥 Khôi phục</div>
    <button class="btn" style="background:#065f46;color:#fff" onclick="document.getElementById('fileInput').click()">📂 Chọn file JSON</button>
    <input id="fileInput" type="file" accept=".json" style="display:none" onchange="importData(event)"/>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:700;color:#ef4444;margin-bottom:6px">🗑 Xóa tất cả</div>
    <button class="btn" style="background:#7f1d1d;color:#fca5a5" onclick="clearAll()">❌ Xóa tất cả dữ liệu</button>
  </div>`;
}

// ── DATA OPS ───────────────────────────────────────────
function exportData() {
  const b=new Blob([JSON.stringify(entries,null,2)],{type:"application/json"}), u=URL.createObjectURL(b), a=document.createElement("a");
  a.href=u; a.download="nhatky-"+new Date().toISOString().slice(0,10)+".json"; a.click(); URL.revokeObjectURL(u);
}
function importData(e) {
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader(); r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); if(Array.isArray(d)){entries=d;save();render();} }catch{alert("File không hợp lệ!");} }; r.readAsText(file); e.target.value="";
}
function clearAll() { if(confirm("Xóa toàn bộ? Không thể hoàn tác!")) { entries=[]; save(); render(); } }

// ── INIT ───────────────────────────────────────────────
render();
</script>
</body>
</html>
